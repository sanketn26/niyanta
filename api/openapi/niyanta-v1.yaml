openapi: 3.1.0
info:
  title: Niyanta Engine API
  version: 2.1.0
  description: >
    The Niyanta platform (durable activity execution engine) API: activities,
    workers, and health. The engine is use-case agnostic; activity payloads are opaque.
    Source of truth for engine request/response shapes; see docs/platform/API_SPEC.md.
servers:
  - url: https://api.niyanta.example.com/v1
security:
  - apiKey: []
tags:
  - name: activities
  - name: recovery
  - name: customers
  - name: workers
  - name: health

paths:
  /activities:
    post:
      tags: [activities]
      summary: Submit a top-level activity
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActivitySubmitRequest' }
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActivitySubmitResponse' }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
        '429': { $ref: '#/components/responses/Error' }
        '503': { $ref: '#/components/responses/Error' }
    get:
      tags: [activities]
      summary: List activities
      parameters:
        - { name: status, in: query, schema: { $ref: '#/components/schemas/ActivityStatus' } }
        - { name: activity_type, in: query, schema: { type: string } }
        - { name: parent_activity_id, in: query, schema: { type: string } }
        - { name: root_activity_id, in: query, schema: { type: string } }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  activities: { type: array, items: { $ref: '#/components/schemas/Activity' } }
                  next_cursor: { type: [string, 'null'] }

  /activities/{activity_id}:
    get:
      tags: [activities]
      summary: Get an activity (optionally long-polling until terminal)
      parameters:
        - $ref: '#/components/parameters/ActivityId'
        - name: wait
          in: query
          required: false
          description: >
            Long-poll window (e.g. "30s", max "60s"). Returns early when the
            activity reaches a terminal state; otherwise returns current state
            after the window.
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Activity' }
        '404': { $ref: '#/components/responses/Error' }

  /activities/{activity_id}:cancel:
    post:
      tags: [activities]
      summary: Cancel an activity and its in-flight children
      parameters: [ { $ref: '#/components/parameters/ActivityId' } ]
      requestBody:
        content:
          application/json:
            schema: { type: object, properties: { reason: { type: string } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Activity' } } } }
        '409': { $ref: '#/components/responses/Error' }

  /activities/{activity_id}:pause:
    post:
      tags: [activities]
      summary: Pause an activity at its next safe suspend point
      parameters: [ { $ref: '#/components/parameters/ActivityId' } ]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Activity' } } } }
        '409': { $ref: '#/components/responses/Error' }

  /activities/{activity_id}:resume:
    post:
      tags: [activities]
      summary: Resume a paused activity
      parameters: [ { $ref: '#/components/parameters/ActivityId' } ]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Activity' } } } }
        '409': { $ref: '#/components/responses/Error' }

  /activities/{activity_id}:signal:
    post:
      tags: [activities]
      summary: Deliver an external signal to an activity
      parameters:
        - $ref: '#/components/parameters/ActivityId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                payload: { type: object, additionalProperties: true }
      responses:
        '200': { description: OK (a retried send with the same Idempotency-Key is one mailbox entry) }
        '404': { $ref: '#/components/responses/Error' }

  /activities/{activity_id}:force-fail:
    post:
      tags: [recovery]
      summary: 'Operator recovery: force the activity to terminal FAILED (audited)'
      parameters: [ { $ref: '#/components/parameters/ActivityId' } ]
      requestBody:
        content:
          application/json:
            schema: { type: object, properties: { reason: { type: string } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Activity' } } } }
        '403': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }

  /activities/{activity_id}:force-complete:
    post:
      tags: [recovery]
      summary: 'Operator recovery: force terminal COMPLETED with a supplied result (audited)'
      parameters: [ { $ref: '#/components/parameters/ActivityId' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [result_json]
              properties:
                result_json: { type: object, additionalProperties: true }
                reason: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Activity' } } } }
        '403': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }

  /activities/{activity_id}:truncate-replay:
    post:
      tags: [recovery]
      summary: 'Operator recovery: drop the call-log suffix from a divergent index and re-enqueue (guarded, audited)'
      parameters: [ { $ref: '#/components/parameters/ActivityId' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from_call_index, confirm]
              properties:
                from_call_index: { type: integer }
                confirm: { type: string, description: Confirmation token echoed from the error payload }
                reason: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Activity' } } } }
        '403': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }

  /activities/{activity_id}/attempts:
    get:
      tags: [activities]
      summary: Get the per-attempt audit trail
      parameters: [ { $ref: '#/components/parameters/ActivityId' } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  attempts: { type: array, items: { $ref: '#/components/schemas/ActivityAttempt' } }

  /activities/{activity_id}/calls:
    get:
      tags: [activities]
      summary: Get the call log for the current execution (replay history)
      parameters: [ { $ref: '#/components/parameters/ActivityId' } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  calls: { type: array, items: { $ref: '#/components/schemas/ActivityCall' } }

  /activities/{activity_id}/signals:
    get:
      tags: [activities]
      summary: Get the signal mailbox (pending and delivered)
      parameters: [ { $ref: '#/components/parameters/ActivityId' } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  signals: { type: array, items: { $ref: '#/components/schemas/Signal' } }

  /activities/{activity_id}/executions:
    get:
      tags: [activities]
      summary: Get the ContinueAsNew execution chain
      parameters: [ { $ref: '#/components/parameters/ActivityId' } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  executions: { type: array, items: { $ref: '#/components/schemas/Execution' } }

  /activities/{activity_id}/audit:
    get:
      tags: [activities]
      summary: Get the activity's audit events
      parameters: [ { $ref: '#/components/parameters/ActivityId' } ]
      responses:
        '200': { description: OK }

  /customers/{customer_id}:
    get:
      tags: [customers]
      summary: Get customer info and limits
      parameters: [ { name: customer_id, in: path, required: true, schema: { type: string } } ]
      responses:
        '200': { description: OK }

  /workers:
    get:
      tags: [workers]
      summary: List workers (admin)
      responses:
        '200': { description: OK }

  /health:
    get:
      tags: [health]
      summary: Liveness
      security: []
      responses:
        '200': { description: OK }
  /ready:
    get:
      tags: [health]
      summary: Readiness
      security: []
      responses:
        '200': { description: Ready }
        '503': { description: Not ready }
  /metrics:
    get:
      tags: [health]
      summary: Prometheus metrics
      security: []
      responses:
        '200': { description: OK, content: { text/plain: {} } }

components:
  securitySchemes:
    apiKey:
      type: http
      scheme: bearer
      description: 'Authorization: Bearer nyt_<customer_id>_<random>'

  parameters:
    ActivityId:
      name: activity_id
      in: path
      required: true
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string, format: uuid }
    Limit:
      name: limit
      in: query
      schema: { type: integer, default: 50, maximum: 100 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }

  responses:
    Error:
      description: Error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    ActivityStatus:
      type: string
      enum: [PENDING, SCHEDULED, RUNNING, SUSPENDED, PAUSED, REDISTRIBUTING, COMPLETED, FAILED, CANCELLED]
    RetryPolicy:
      type: object
      properties:
        max_attempts: { type: integer, default: 3 }
        backoff: { type: string, enum: [exponential, linear, none], default: exponential }
    AffinityConstraint:
      type: object
      properties:
        worker_id: { type: string }
        worker_tags: { type: object, additionalProperties: { type: string } }
        activity_types: { type: array, items: { type: string } }
    AffinityRules:
      type: object
      properties:
        hard_affinity: { $ref: '#/components/schemas/AffinityConstraint' }
        soft_affinity: { $ref: '#/components/schemas/AffinityConstraint' }
        anti_affinity: { $ref: '#/components/schemas/AffinityConstraint' }
    ActivitySubmitRequest:
      type: object
      required: [activity_type, input_json]
      properties:
        activity_type: { type: string }
        input_json:
          type: object
          additionalProperties: true
          description: Opaque to the engine; meaningful only to the activity's app.
        priority: { type: integer, default: 10 }
        affinity_rules: { $ref: '#/components/schemas/AffinityRules' }
        retry_policy: { $ref: '#/components/schemas/RetryPolicy' }
    ActivitySubmitResponse:
      type: object
      properties:
        activity_id: { type: string }
        status: { $ref: '#/components/schemas/ActivityStatus' }
        created_at: { type: string, format: date-time }
        estimated_start_time: { type: string, format: date-time }
    Activity:
      type: object
      properties:
        activity_id: { type: string }
        customer_id: { type: string }
        activity_type: { type: string }
        parent_activity_id: { type: [string, 'null'] }
        root_activity_id: { type: [string, 'null'] }
        status: { $ref: '#/components/schemas/ActivityStatus' }
        suspend_reason: { type: [string, 'null'], enum: [run_child, sleep, await_signal, null] }
        wake_at: { type: [string, 'null'], format: date-time }
        priority: { type: integer }
        worker_id: { type: [string, 'null'] }
        pinned_version: { type: [string, 'null'], description: Code version this activity's replay is pinned to (set at first suspend) }
        execution_seq: { type: integer, description: Current execution in the ContinueAsNew chain (starts at 1) }
        input_json: { type: object, additionalProperties: true }
        result_json: { type: [object, 'null'], additionalProperties: true }
        error_json: { type: [object, 'null'], additionalProperties: true, description: 'On nondeterminism: {type: "nondeterminism", call_index, confirm}' }
        current_attempt: { type: integer }
        generation: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }
        started_at: { type: [string, 'null'], format: date-time }
        completed_at: { type: [string, 'null'], format: date-time }
    AttemptStatus:
      type: string
      enum: [PENDING, RUNNING, COMPLETED, FAILED, INTERRUPTED, FENCED]
    ActivityAttempt:
      type: object
      properties:
        attempt_number: { type: integer }
        worker_id: { type: [string, 'null'] }
        generation: { type: integer, format: int64 }
        status: { $ref: '#/components/schemas/AttemptStatus' }
        lease_expires_at: { type: [string, 'null'], format: date-time }
        error: { type: [object, 'null'], additionalProperties: true }
        started_at: { type: string, format: date-time }
        ended_at: { type: [string, 'null'], format: date-time }
    ActivityCall:
      type: object
      properties:
        call_index: { type: integer }
        execution_seq: { type: integer }
        call_type: { type: string, enum: [run_child, sleep, await_signal, _now, _id] }
        args_hash: { type: [string, 'null'] }
        child_activity_id: { type: [string, 'null'] }
        completed: { type: boolean }
        result_json: { type: [object, 'null'], additionalProperties: true }
        created_at: { type: string, format: date-time }
        completed_at: { type: [string, 'null'], format: date-time }
    Signal:
      type: object
      properties:
        name: { type: string }
        payload_json: { type: [object, 'null'], additionalProperties: true }
        dedupe_key: { type: [string, 'null'] }
        delivered: { type: boolean }
        created_at: { type: string, format: date-time }
        delivered_at: { type: [string, 'null'], format: date-time }
    Execution:
      type: object
      properties:
        execution_seq: { type: integer }
        status: { $ref: '#/components/schemas/ActivityStatus' }
        input_json: { type: object, additionalProperties: true }
        result_json: { type: [object, 'null'], additionalProperties: true }
        call_count: { type: integer }
        started_at: { type: [string, 'null'], format: date-time }
        ended_at: { type: [string, 'null'], format: date-time }
    Error:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, enum: [INVALID_INPUT, INVALID_STATE, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, CONFLICT, RATE_LIMITED, SERVICE_UNAVAILABLE, INTERNAL_ERROR] }
            message: { type: string }
            details: { type: object, additionalProperties: true }
            request_id: { type: string }
