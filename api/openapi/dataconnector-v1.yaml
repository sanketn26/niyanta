openapi: 3.1.0
info:
  title: Niyanta Data Connector App API
  version: 0.1.0
  description: >
    The Data Connector application API — connector definitions, connections, runs,
    catalogs, controls, and the customer ingestion view. NOT part of the Niyanta
    engine API (api/openapi/niyanta-v1.yaml); this is the app's own surface.
    Partial stub. See docs/apps/dataconnector/API_SPEC.md.
servers:
  - url: https://api.niyanta.example.com/v1
security:
  - apiKey: []
tags:
  - name: connections
  - name: controls
  - name: runs
  - name: ingestion-view

paths:
  /connector-connections:
    post:
      tags: [connections]
      summary: Create a connector connection
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateConnectionRequest' }
      responses:
        '201': { description: Created }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
    get:
      tags: [connections]
      summary: List connections
      responses: { '200': { description: OK } }

  /connector-connections/{id}:
    get:
      tags: [connections]
      summary: Get a connection (with health and active controls)
      parameters: [ { $ref: '#/components/parameters/ConnectionId' } ]
      responses: { '200': { description: OK }, '404': { $ref: '#/components/responses/Error' } }

  /connector-connections/{id}:rate-limit:
    post:
      tags: [controls]
      summary: Apply a rate-limit override to an erring connection
      parameters: [ { $ref: '#/components/parameters/ConnectionId' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RateLimitControl' }
      responses: { '200': { description: OK } }

  /connector-connections/{id}:clear-control:
    post:
      tags: [controls]
      summary: Clear an active control
      parameters: [ { $ref: '#/components/parameters/ConnectionId' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [control_id]
              properties:
                control_id: { type: string }
                reason: { type: string }
      responses: { '200': { description: OK } }

  /connector-runs/{id}:
    get:
      tags: [runs]
      summary: Get a connector run
      parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
      responses: { '200': { description: OK } }

  /customers/{cid}/ingestion-view:
    get:
      tags: [ingestion-view]
      summary: Customer-scoped ingestion dashboard
      parameters:
        - { name: cid, in: path, required: true, schema: { type: string } }
        - { name: window, in: query, schema: { type: string, default: '1h' } }
      responses: { '200': { description: OK } }

components:
  securitySchemes:
    apiKey: { type: http, scheme: bearer }
  parameters:
    ConnectionId: { name: id, in: path, required: true, schema: { type: string } }
    IdempotencyKey: { name: Idempotency-Key, in: header, required: false, schema: { type: string, format: uuid } }
  responses:
    Error:
      description: Error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    CreateConnectionRequest:
      type: object
      required: [definition_id, definition_version, name, destination]
      properties:
        definition_id: { type: string }
        definition_version: { type: string }
        name: { type: string }
        config: { type: object, additionalProperties: true }
        secret_refs:
          type: object
          additionalProperties: { type: string, pattern: '^secret://' }
        destination: { type: object, additionalProperties: true }
        isolation:
          type: object
          properties:
            level: { type: string, enum: [shared, pooled, dedicated] }
            worker_pool: { type: string }
    RateLimitControl:
      type: object
      properties:
        qps: { type: number }
        burst: { type: integer }
        max_parallel_partitions: { type: integer }
        reason: { type: string }
        expires_at: { type: string, format: date-time }
    Error:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object, additionalProperties: true }
            request_id: { type: string }
