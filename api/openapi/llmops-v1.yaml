openapi: 3.1.0
info:
  title: Niyanta LLMOps App API
  version: 0.1.0
  description: >
    The LLMOps application API — findings, remediations, runbooks, policy, playbooks,
    and cost. NOT part of the Niyanta engine API; this is the app's own surface.
    Remediation apply/rollback call the Data Connector control API underneath.
    Partial stub. See docs/apps/llmops/LLMOPS_SPEC.md.
servers:
  - url: https://api.niyanta.example.com/v1
security:
  - apiKey: []
tags:
  - name: findings
  - name: remediations
  - name: runbooks
  - name: cost

paths:
  /customers/{cid}/llmops/connections/{connection_id}:diagnose:
    post:
      tags: [findings]
      summary: Manually trigger a diagnosis for a connection
      parameters:
        - { $ref: '#/components/parameters/Cid' }
        - { name: connection_id, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema: { type: object, properties: { reason: { type: string } } }
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  diagnosis_run_id: { type: string }
                  status: { type: string }
                  activity_id: { type: string }

  /customers/{cid}/llmops/findings:
    get:
      tags: [findings]
      summary: List findings
      parameters:
        - { $ref: '#/components/parameters/Cid' }
        - { name: issue_category, in: query, schema: { $ref: '#/components/schemas/IssueCategory' } }
        - { name: connection_id, in: query, schema: { type: string } }
        - { name: confidence_gte, in: query, schema: { type: number } }
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Cursor' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  findings: { type: array, items: { $ref: '#/components/schemas/Finding' } }
                  next_cursor: { type: [string, 'null'] }

  /customers/{cid}/llmops/findings/{id}:
    get:
      tags: [findings]
      summary: Get a finding
      parameters:
        - { $ref: '#/components/parameters/Cid' }
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Finding' }

  /customers/{cid}/llmops/remediations/{id}:apply:
    post:
      tags: [remediations]
      summary: Apply a suggested remediation (calls Data Connector control API)
      parameters:
        - { $ref: '#/components/parameters/Cid' }
        - { name: id, in: path, required: true, schema: { type: string } }
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                approved_by: { type: string }
                override_confidence_floor: { type: boolean, default: false }
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }

  /customers/{cid}/llmops/remediations/{id}:rollback:
    post:
      tags: [remediations]
      summary: Roll back an applied remediation
      parameters:
        - { $ref: '#/components/parameters/Cid' }
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema: { type: object, properties: { reason: { type: string } } }
      responses: { '200': { description: OK } }

  /customers/{cid}/llmops/runbooks:
    get:
      tags: [runbooks]
      summary: List runbooks
      parameters: [ { $ref: '#/components/parameters/Cid' } ]
      responses: { '200': { description: OK } }
    post:
      tags: [runbooks]
      summary: Create a runbook
      parameters: [ { $ref: '#/components/parameters/Cid' } ]
      requestBody:
        required: true
        content:
          application/json: { schema: { type: object, additionalProperties: true } }
          application/yaml: { schema: { type: string } }
      responses: { '201': { description: Created }, '400': { $ref: '#/components/responses/Error' } }

  /customers/{cid}/llmops/cost:
    get:
      tags: [cost]
      summary: Model spend over a window
      parameters:
        - { $ref: '#/components/parameters/Cid' }
        - { name: window, in: query, schema: { type: string, default: '24h' } }
      responses: { '200': { description: OK } }

components:
  securitySchemes:
    apiKey: { type: http, scheme: bearer }
  parameters:
    Cid: { name: cid, in: path, required: true, schema: { type: string } }
    Limit: { name: limit, in: query, schema: { type: integer, default: 50, maximum: 100 } }
    Cursor: { name: cursor, in: query, schema: { type: string } }
    IdempotencyKey: { name: Idempotency-Key, in: header, required: false, schema: { type: string, format: uuid } }
  responses:
    Error:
      description: Error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    IssueCategory:
      type: string
      enum: [auth_failure, source_rate_limited, source_outage, parser_drop_storm, destination_failure, lag_growth, checkpoint_stall, config_drift, unknown]
    Finding:
      type: object
      properties:
        id: { type: string }
        connection_id: { type: string }
        diagnosis_run_id: { type: string }
        issue_category: { $ref: '#/components/schemas/IssueCategory' }
        confidence: { type: number, minimum: 0, maximum: 1 }
        root_cause: { type: string }
        evidence:
          type: array
          items: { type: object, properties: { type: { type: string }, ref: { type: string }, window: { type: string } } }
        suggested_action:
          type: object
          properties:
            control_type: { type: string, enum: [rate_limit_override, temporary_disable, pause, resume, quarantine] }
            config: { type: object, additionalProperties: true }
        auto_actionable: { type: boolean }
        created_at: { type: string, format: date-time }
    Error:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object, additionalProperties: true }
            request_id: { type: string }
